<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/><line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Hexagon decorative -->
  <g transform="translate(920, 180)" opacity="0.08">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#00ff88" stroke-width="3"/>
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#00ff88" stroke-width="2"/>
  </g>
  <g transform="translate(1030, 400)" opacity="0.06">
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="none" stroke="#00ff88" stroke-width="2"/>
    <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(120, 315)" fill="none" stroke="url(#accent)" stroke-width="4">
    <path d="M0,-50 L40,-30 L40,15 C40,45 0,65 0,65 C0,65 -40,45 -40,15 L-40,-30 Z"/>
    <path d="M-18,-8 L-8,4 L18,-18" stroke="#00ff88" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- glitch accent bottom -->
  <rect x="0" y="600" width="1200" height="4" fill="#00ff88" opacity="0.4"/>

  <!-- Main title -->
  <text x="180" y="240" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="3">
    Zane's Note
  </text>

  <!-- Tagline -->
  <text x="180" y="290" font-family="monospace, 'Courier New'" font-size="24" fill="#888888" letter-spacing="1">
    Cybersecurity &amp; Penetration Testing Writeups
  </text>

  <!-- Code-like bracket decoration -->
  <text x="180" y="370" font-family="monospace, 'Courier New'" font-size="16" fill="#00ff88" opacity="0.6">
    $ cat /var/log/learning.log | grep oscp
  </text>

  <text x="180" y="395" font-family="monospace, 'Courier New'" font-size="16" fill="#ff6b6b" opacity="0.6">
    &gt; Pls PEENCE I wan't OSCP
  </text>

  <!-- Bottom right indicator -->
  <text x="1060" y="580" font-family="monospace, 'Courier New'" font-size="12" fill="#333333">
    [just-blog]
  </text>
</svg>
